schema_version: "1.0"
campaign_id: example-artifact-dry-run
name: Provided artifact and cryptographic controls dry run
description: Plans provided-artifact review without contacting a network target.
limits:
  max_iterations: 2
  max_runtime_seconds: 30
  max_requests: 2
  max_consecutive_failures: 1
execution:
  default_mode: dry_run
  continue_on_inconclusive: true
  pause_on_manual_review: true
  stop_on_policy_denial: true
stop_conditions:
  - operator_stop
  - policy_denial
  - human_review
  - iteration_limit
  - runtime_limit
  - request_limit
objectives:
  - id: sbom-dependency-review
    title: Review the provided dependency inventory
    module: sbom_review
    category: sbom_review
    action: inspect_provided_artifact
    target_alias: local-placeholder
    target_category: provided_artifact
    artifact: artifacts/sbom.placeholder.json
    artifact_mapping: [SBOM-component-inventory]
    priority: 10
    depends_on: []
    requires_human_approval: false
    parameters:
      request_budget: 0
  - id: cryptographic-controls-review
    title: Review provided cryptographic configuration evidence
    module: crypto_controls
    category: crypto_controls
    action: inspect_provided_crypto_evidence
    target_alias: local-placeholder
    target_category: configuration_artifact
    artifact_mapping: [TLS, cookie-attributes, token-configuration]
    tls_evidence:
      protocol: TLSv1.2
      certificate_subject_alias: example-subject
      certificate_issuer_alias: example-issuer
      public_key_algorithm: RSA
      public_key_bits: 2048
      signature_algorithm: sha256WithRSAEncryption
    cookie_attributes:
      - cookie_alias: session-cookie
        secure: true
        http_only: true
        same_site: Lax
        host_only: true
    token_configuration:
      algorithm: RS256
      issuer_validation: true
      audience_validation: true
      expiration_validation: true
      key_source_alias: configured-public-key-set
    weak_algorithm_indicators: []
    key_management_metadata:
      provider_alias: managed-key-provider
      storage_type: external-managed-service
      rotation_configured: true
      private_material_present: false
    priority: 20
    depends_on:
      - sbom-dependency-review
    requires_human_approval: false
    parameters:
      request_budget: 0
