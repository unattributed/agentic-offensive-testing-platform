name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[dev,audit]'
      - run: python scripts/audit-proprietary-license.py
      - run: python scripts/generate-dependency-license-inventory.py --output /tmp/dependency-license-inventory.json
      - run: python scripts/audit-commercial-release-readiness.py
      - run: python -m pip_audit
      - run: python -m compileall -q src tests
      - run: python -m pytest
      - run: ./scripts/validate-repository-safety.sh
