[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agentic-offensive-testing-platform"
version = "0.1.0"
description = "Policy-constrained campaign harness for authorized offensive security testing."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Duncan Stirling" }]
dependencies = ["PyYAML>=6.0,<7"]

[project.optional-dependencies]
dev = ["pytest>=8.0,<9"]

[project.scripts]
aotp = "aotp.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"
